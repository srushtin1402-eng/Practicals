<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Srushti's Practical Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.container{

width:900px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:25px;

padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,.4);

border:1px solid rgba(255,255,255,.15);

}

h1{

color:white;

text-align:center;

font-size:42px;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:35px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}

.card{

background:rgba(255,255,255,.08);

padding:22px;

border-radius:18px;

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

background:rgba(255,255,255,.12);

}

.card h2{

color:white;

margin-bottom:15px;

font-size:22px;

}

.button{

display:block;

padding:12px;

text-align:center;

background:#8b5cf6;

border-radius:10px;

text-decoration:none;

color:white;

font-weight:bold;

transition:.3s;

}

.button:hover{

background:#7c3aed;

}

.footer{

margin-top:35px;

text-align:center;

color:#94a3b8;

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h1>💻 Practical Hub</h1>

<p class="subtitle">
My Computer Practical PDFs
</p>

<div class="grid">

<div class="card">

<h2>📄 Practical 1</h2>

<a class="button" href="Practical1.pdf">
Open PDF
</a>

</div>

<div class="card">

<h2>📄 Practical 2</h2>

<a class="button" href="Practical2.pdf">
Open PDF
</a>

</div>

<div class="card">

<h2>📄 Practical 3</h2>

<a class="button" href="Practical3.pdf">
Open PDF
</a>

</div>

</div>

<div class="footer">

Designed & Maintained by <strong>Srushti Nigade</strong>

</div>

</div>

</body>

</html>
